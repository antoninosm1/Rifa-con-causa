<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba Rifa con Causa</title>
</head>
<body>
  <h1>Prueba de conexión con alertas y consola</h1>
  <button id="btnOK">Consultar normal</button>
  <button id="btnError">Consultar con error</button>
  <button id="btnPost">Enviar número</button>
  <pre id="salida"></pre>

  <script>
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwUFTQ7LA0TXPyj2W94NhjsFjIOFabgB6lJjW14rKcUc2uWmh98P8cFfl-d13wA9k-fRQ/exec";

    function consultar(url) {
      console.log("📤 Enviando GET a:", url);
      fetch(url)
        .then(res => {
          console.log("📥 Respuesta cruda:", res);
          return res.json();
        })
        .then(data => {
          console.log("✅ JSON parseado:", data);
          if (data.error) {
            alert("⚠️ Error recibido: " + data.error);
          } else {
            alert("✅ Respuesta correcta: " + data.mensaje);
          }
          document.getElementById("salida").textContent = JSON.stringify(data, null, 2);
        })
        .catch(err => {
          alert("❌ Error de conexión: " + err.message);
          console.error("❌ Error al consultar WebApp:", err);
        });
    }

    function enviarPost() {
      const datos = new URLSearchParams();
      datos.append("numero", "99");
      datos.append("comprador", "Prueba");

      console.log("📤 Enviando POST con:", Object.fromEntries(datos));
      fetch(WEBAPP_URL, { method: "POST", body: datos })
        .then(res => {
          console.log("📥 Respuesta cruda POST:", res);
          return res.json();
        })
        .then(data => {
          console.log("✅ JSON parseado POST:", data);
          if (data.error) {
            alert("⚠️ Error en POST: " + data.error);
          } else {
            alert("✅ POST correcto: " + data.mensaje);
          }
          document.getElementById("salida").textContent = JSON.stringify(data, null, 2);
        })
        .catch(err => {
          alert("❌ Error de conexión en POST: " + err.message);
          console.error("❌ Error al consultar WebApp (POST):", err);
        });
    }

    document.getElementById("btnOK").addEventListener("click", () => {
      consultar(WEBAPP_URL);
    });

    document.getElementById("btnError").addEventListener("click", () => {
      consultar(WEBAPP_URL + "?error=true");
    });

    document.getElementById("btnPost").addEventListener("click", () => {
      enviarPost();
    });
  </script>
</body>
</html>
