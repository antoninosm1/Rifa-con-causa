
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba básica WebApp</title>
</head>
<body>
  <h1>Prueba básica de conexión</h1>
  <button id="btn">Consultar WebApp</button>
  <pre id="salida"></pre>

  <script>
    // ⚠️ Sustituye por la URL de tu WebApp publicada (termina en /exec)
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwUFTQ7LA0TXPyj2W94NhjsFjIOFabgB6lJjW14rKcUc2uWmh98P8cFfl-d13wA9k-fRQ/exec";

    document.getElementById("btn").addEventListener("click", () => {
      fetch(WEBAPP_URL)
        .then(res => res.json())
        .then(data => {
          console.log("✅ Respuesta recibida:", data);
          document.getElementById("salida").textContent = JSON.stringify(data, null, 2);
        })
        .catch(err => {
          console.error("⚠️ Error al consultar WebApp:", err);
        });
    });
  </script>
</body>
</html>
