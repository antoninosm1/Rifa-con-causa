<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rifa con Causa</title>
  <style>
    body { font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
    .container { max-width: 700px; margin: auto; text-align: center; }
    #grid { display: grid; grid-template-columns: repeat(10, 50px); gap: 6px; justify-content: center; margin: 20px auto; }
    .cell { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            border: 1px solid #ccc; cursor: pointer; border-radius: 4px; font-weight: bold; }
    .libre { background: #dcfce7; color: #15803d; }
    .ocupado { background: #fee2e2; color: #dc2626; cursor: not-allowed; }
    form { margin-top: 20px; }
    input { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 20px; margin-top: 10px; border: none; border-radius: 4px; background: #2563eb; color: white; cursor: pointer; }
    #salida { margin-top: 20px; background: #0f172a; color: #38bdf8; padding: 10px; border-radius: 6px; font-family: monospace; }
  </style>
</head>
<body>

<div class="container">
  <h2>Rifa con Causa</h2>

  <!-- Cuadrícula de números -->
  <div id="grid"></div>

  <!-- Formulario para registrar comprador y teléfono -->
  <form id="formRegistro">
    <input type="text" id="comprador" placeholder="Nombre del comprador" required>
    <input type="text" id="telefono" placeholder="Teléfono" required>
    <input type="hidden" id="numeroSeleccionado">
    <button type="submit">Registrar Número</button>
  </form>

  <pre id="salida">Esperando...</pre>
</div>
<script>
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwrCbLyuW6dumhCA6G2uFYgDr835igQUB4m1F3xWpWr3Doc0GPWkF9N2cOdRxN_cd4mJw/exec";

  // Construcción inicial de la cuadrícula (del 00 al 99)
  const grid = document.getElementById("grid");
  for (let i = 0; i < 100; i++) {
    const numero = i.toString().padStart(2, "0");
    const cell = document.createElement("div");
    cell.textContent = numero;
    cell.className = "cell libre";
    cell.dataset.numero = numero;
    cell.addEventListener("click", () => seleccionarNumero(numero, cell));
    grid.appendChild(cell);
  }

  // Consultar ocupados/libres desde la hoja
  async function consultar() {
    try {
      const res = await fetch(WEBAPP_URL);
      const texto = await res.text();
      const data = JSON.parse(texto);

      if (data.error) {
        document.getElementById("salida").textContent = "Error: " + data.error;
        return;
      }

      // Reiniciar todas las celdas como libres
      document.querySelectorAll(".cell").forEach(c => c.className = "cell libre");

      // Recorrer todas las filas y marcar ocupados si columna D (índice 3) tiene valor
      data.datos.forEach((fila, idx) => {
        try {
          const numero = fila[0];       // Columna A: número
          const comprador = fila[3];    // Columna D: nombre
          if (numero) {
            const numStr = numero.toString().padStart(2, "0");
            const cell = document.querySelector(`.cell[data-numero='${numStr}']`);
            if (cell && comprador && comprador.trim() !== "") {
              cell.className = "cell ocupado";
            }
          }
        } catch (errFila) {
          console.error("Error procesando fila " + idx + ":", errFila);
        }
      });

      document.getElementById("salida").textContent = "Lista actualizada";
    } catch (err) {
      document.getElementById("salida").textContent = "Error de conexión: " + err.message;
    }
  }

  // Seleccionar número libre y mostrarlo en el formulario
  function seleccionarNumero(num, cell) {
    if (cell.classList.contains("ocupado")) return;
    document.getElementById("numeroSeleccionado").value = num;
    document.getElementById("salida").textContent = "Número seleccionado: " + num;
  }

  // Enviar registro al WebApp
  document.getElementById("formRegistro").addEventListener("submit", async (e) => {
    e.preventDefault();
    const num = document.getElementById("numeroSeleccionado").value;
    const comprador = document.getElementById("comprador").value;
    const telefono = document.getElementById("telefono").value;

    if (!num) {
      alert("Selecciona un número en la cuadrícula primero");
      return;
    }

    const params = new URLSearchParams();
    params.append("numero", num);
    params.append("comprador", comprador);
    params.append("telefono", telefono);

    try {
      const res = await fetch(WEBAPP_URL, {
        method: "POST",
        body: params,
        headers: { "Content-Type": "application/x-www-form-urlencoded" }
      });
      const texto = await res.text();
      const data = JSON.parse(texto);

      if (data.error) {
        alert("Error: " + data.error);
      } else {
        // Pintar inmediatamente en rojo la celda seleccionada
        const cell = document.querySelector(`.cell[data-numero='${num}']`);
        if (cell) cell.className = "cell ocupado";

        document.getElementById("formRegistro").reset();
        document.getElementById("salida").textContent = "Número " + num + " registrado correctamente";

        // Refrescar cuadrícula desde la hoja para confirmar
        consultar();
      }
    } catch (err) {
      alert("Error de conexión: " + err.message);
    }
  });

  // Cargar estado inicial
  consultar();
</script>
</body>
</html>
