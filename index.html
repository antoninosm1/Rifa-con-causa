<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rifa con Causa</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    /* Contenedor de la cuadrícula */
    #grid { display: grid; grid-template-columns: repeat(10, 40px); gap: 5px; margin-bottom: 20px; }
    .cell { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border: 1px solid #ccc; cursor: pointer; border-radius: 4px; }
    .libre { background: #dcfce7; color: #15803d; }
    .ocupado { background: #fee2e2; color: #dc2626; cursor: not-allowed; }
  </style>
</head>
<body>

<h2>Rifa con Causa</h2>

<!-- Aquí se dibuja la cuadrícula de números -->
<div id="grid"></div>

<pre id="salida">Esperando...</pre>

<script>
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbw8YKXck4uAxayGYo1f9G_wC-83__MRidpcZu4BDG14eRR26vmHWsno3Sq_u-l7RpEXjQ/exec";

  // Construcción inicial de la cuadrícula (del 00 al 99)
  const grid = document.getElementById("grid");
  for (let i = 0; i < 100; i++) {
    const numero = i.toString().padStart(2, "0"); // Formatear con dos dígitos
    const cell = document.createElement("div");
    cell.textContent = numero;          // Mostrar "00", "01", ..., "99"
    cell.className = "cell libre";
    cell.dataset.numero = numero;       // Guardar el valor formateado
    cell.addEventListener("click", () => seleccionarNumero(numero, cell));
    grid.appendChild(cell);
  }

  // Función para consultar al WebApp y actualizar la cuadrícula
  async function consultar() {
    try {
      const res = await fetch(WEBAPP_URL);
      const texto = await res.text();
      const data = JSON.parse(texto);

      if (data.error) {
        document.getElementById("salida").textContent = "Error: " + data.error;
        return;
      }

      // Reiniciar todas las celdas como libres
      document.querySelectorAll(".cell").forEach(c => c.className = "cell libre");

      // Marcar como ocupados los números que vienen de la hoja
      data.datos.forEach(fila => {
        const numero = fila[0];
        if (numero) {
          const numStr = numero.toString().padStart(2, "0");
          const cell = document.querySelector(`.cell[data-numero='${numStr}']`);
          if (cell) cell.className = "cell ocupado";
        }
      });

      document.getElementById("salida").textContent = "Lista actualizada";
    } catch (err) {
      document.getElementById("salida").textContent = "Error de conexión: " + err.message;
    }
  }

  // Función para seleccionar un número libre y enviarlo al WebApp
  async function seleccionarNumero(num, cell) {
    if (cell.classList.contains("ocupado")) return;

    const comprador = prompt("Nombre del comprador para el número " + num);
    if (!comprador) return;

    const telefono = prompt("Teléfono del comprador para el número " + num);
    if (!telefono) return;

    const params = new URLSearchParams();
    params.append("numero", num);
    params.append("comprador", comprador);
    params.append("telefono", telefono);

    try {
      const res = await fetch(WEBAPP_URL, {
        method: "POST",
        body: params,
        headers: { "Content-Type": "application/x-www-form-urlencoded" }
      });
      const texto = await res.text();
      const data = JSON.parse(texto);

      if (data.error) {
        alert("Error: " + data.error);
      } else {
        alert("Registro exitoso: " + data.numero);
        consultar(); // refrescar cuadrícula
      }
    } catch (err) {
      alert("Error de conexión: " + err.message);
    }
  }

  // Al cargar la página, se consulta la hoja y se pinta la cuadrícula
  consultar();
</script>

</body>
</html>
