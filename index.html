<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión Rifa con Causa</title>
  <style>
    :root { --primary: #2563eb; --error: #dc2626; --bg: #f8fafc; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    h2 { margin-top: 0; color: var(--primary); border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 600; }
    input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
    .btn-group { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
    button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; min-width: 140px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: #64748b; color: white; }
    .btn-danger { background: var(--error); color: white; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #salida { background: #0f172a; color: #38bdf8; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.85rem; overflow-x: auto; min-height: 60px; white-space: pre-wrap; }
    .status { font-weight: bold; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="container">
  <h2>🎟️ Registro de Rifa</h2>
  
  <div class="form-group">
    <label>Nombre del Comprador:</label>
    <input type="text" id="comprador" placeholder="Ej. Juan Pérez">
  </div>
  
  <div class="form-group">
    <label>Número a comprar:</label>
    <input type="number" id="numero" placeholder="Ej. 05">
  </div>

  <div class="btn-group">
    <button onclick="enviar()" class="btn-primary" id="btnEnviar">Registrar Pago</button>
    <button onclick="consultar()" class="btn-secondary">Ver Lista</button>
    <button onclick="consultar(true)" class="btn-danger">Test Error</button>
  </div>

  <div class="status" id="estado">Listo para operar</div>
  <pre id="salida">Los resultados aparecerán aquí...</pre>
</div>

<!-- ... (Mismo CSS anterior) ... -->
<script>
  const WEBAPP_URL = "TU_NUEVA_URL_AQUÍ"; // Reemplaza cada vez que hagas "Nueva implementación"

  // NUEVA MEJORA: Función para limpiar el formulario tras el éxito
  function limpiarCampos() {
    document.getElementById("numero").value = "";
    document.getElementById("comprador").value = "";
  }

  async function apiCall(url, options = {}) {
    const out = document.getElementById("salida");
    const status = document.getElementById("status");
    
    try {
      const res = await fetch(url, options);
      const text = await res.text();
      const data = JSON.parse(text);
      
      out.textContent = JSON.stringify(data, null, 2);

      if (data.error) {
        status.textContent = "❌ " + data.error;
        status.style.background = "#fee2e2";
      } else {
        status.textContent = "✅ " + (data.mensaje || "Operación exitosa");
        status.style.background = "#dcfce7";
        if(options.method === "POST") limpiarCampos(); // Limpia solo si fue un registro
      }
      status.style.display = "block";

    } catch (err) {
      out.textContent = "Error crítico: " + err.message;
      status.textContent = "❌ Error de conexión";
      status.style.background = "#fee2e2";
      status.style.display = "block";
    }
  }

  // Las funciones enviar() y consultar() se mantienen igual
</script>

</body>
</html>
