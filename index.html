<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rifa con Causa</title>
  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(10, 60px);
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }
    .number {
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      cursor: pointer;
      background-color: #e0f7fa;
      transition: background-color 0.3s, transform 0.2s;
      font-weight: bold;
      text-align: center;
    }
    .number:hover { background-color: #80deea; transform: scale(1.05); }
    .occupied { background-color: #ef5350; color: white; cursor: not-allowed; border: 1px solid #c62828; }
    .selected { background-color: #4caf50; color: white; cursor: not-allowed; border: 1px solid #2e7d32; }
    #refreshBtn {
      margin-top: 20px; padding: 10px 20px;
      background-color: #2c3e50; color: white;
      border: none; border-radius: 6px; cursor: pointer;
      font-size: 14px;
    }
    #refreshBtn:hover { background-color: #34495e; }
    input#comprador {
      margin-bottom: 15px; padding: 8px;
      border-radius: 6px; border: 1px solid #ccc;
      width: 200px;
    }
  </style>
</head>
<body>
  <h1>Rifa con Causa</h1>
  <p>Escribe tu nombre y selecciona tu número.</p>
  <input type="text" id="comprador" placeholder="Tu nombre">
  <div class="grid" id="grid"></div>

  <!-- Formulario oculto que enviará datos al WebApp -->
  <form id="formRifa" 
        action="https://script.google.com/macros/s/AKfycbxO0kOF8bF4qryKAwPiwtl_ONtMaVIx_54cqCqkdzEqNtJJr4r-uYGj8_IQFJrKDHf_fA/exec" 
        method="POST" target="_blank" style="display:none;">
    <input type="hidden" name="numero" id="numeroHidden">
    <input type="hidden" name="comprador" id="compradorHidden">
  </form>

  <button id="refreshBtn">Ver BD</button>

  <script>
    const grid = document.getElementById("grid");
    const form = document.getElementById("formRifa");
    const numeroHidden = document.getElementById("numeroHidden");
    const compradorHidden = document.getElementById("compradorHidden");

    // Dibujar cuadrícula
    for (let i = 0; i < 100; i++) {
      const num = i.toString().padStart(2, "0");
      const div = document.createElement("div");
      div.className = "number";
      div.textContent = num;

      div.addEventListener("click", () => {
        // Evitar seleccionar más de un número
        if (document.querySelector(".selected")) {
          alert("Ya seleccionaste un número.");
          return;
        }

        // Al hacer clic, llenamos el formulario oculto y lo enviamos
        const comprador = document.getElementById("comprador").value || "Anonimo";
        numeroHidden.value = num;
        compradorHidden.value = comprador;
        console.log("Enviando al WebApp:", { numero: num, comprador });
        form.submit(); // envía directamente al WebApp
        div.classList.add("selected");
      });

      grid.appendChild(div);
    }

    // Botón BD abre la hoja en otra pestaña
    document.getElementById("refreshBtn").addEventListener("click", () => {
      window.open("https://script.google.com/macros/s/AKfycbxO0kOF8bF4qryKAwPiwtl_ONtMaVIx_54cqCqkdzEqNtJJr4r-uYGj8_IQFJrKDHf_fA/exec", "_blank");
    });
  </script>
<script>
  const grid = document.getElementById("grid");
  const numeroHidden = document.getElementById("numeroHidden");
  const compradorHidden = document.getElementById("compradorHidden");

  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxO0kOF8bF4qryKAwPiwtl_ONtMaVIx_54cqCqkdzEqNtJJr4r-uYGj8_IQFJrKDHf_fA/exec";

  for (let i = 0; i < 100; i++) {
    const num = i.toString().padStart(2, "0");
    const div = document.createElement("div");
    div.className = "number";
    div.textContent = num;

    div.addEventListener("click", () => {
      if (document.querySelector(".selected")) {
        alert("Ya seleccionaste un número.");
        return;
      }

      const comprador = document.getElementById("comprador").value || "Anonimo";

      console.log("➡️ Enviando al WebApp:", { numero: num, comprador });

      // Enviar con fetch y capturar respuesta
      fetch(WEBAPP_URL, {
        method: "POST",
        body: new URLSearchParams({ numero: num, comprador: comprador })
      })
      .then(res => res.text())
      .then(texto => {
        console.log("✅ Respuesta del WebApp:", texto);
        alert(texto); // opcional, mostrar al usuario
        div.classList.add("selected");
      })
      .catch(err => {
        console.error("⚠️ Error al contactar WebApp:", err);
        alert("Error al contactar WebApp: " + err);
      });
    });

    grid.appendChild(div);
  }

  document.getElementById("refreshBtn").addEventListener("click", () => {
    console.log("📂 Abriendo BD en nueva pestaña");
    window.open(WEBAPP_URL, "_blank");
  });
</script></body>
</html>
