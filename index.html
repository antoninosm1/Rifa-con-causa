<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rifa Con Causa - Conexión</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 20px auto; }
    #salida { background: #333; color: #fff; padding: 15px; border-radius: 5px; min-height: 50px; white-space: pre-wrap; }
    button { padding: 10px; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Panel de Pruebas Rifa</h2>
  <button onclick="consultar()">Consultar Lista</button>
  <button onclick="consultar(true)">Forzar Error</button>
  <button onclick="enviar()">Registrar Número 99</button>
  
  <h4>Consola de salida:</h4>
  <div id="salida">Esperando comandos...</div>

  <script>
    // URL de tu WebApp publicada (termina en /exec)
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwUFTQ7LA0TXPyj2W94NhjsFjIOFabgB6lJjW14rKcUc2uWmh98P8cFfl-d13wA9k-fRQ/exec";

    async function consultar(conError = false) {
      const url = conError ? `${WEBAPP_URL}?error=true` : WEBAPP_URL;
      const log = document.getElementById("salida");
      log.textContent = "Consultando...";
      console.log("📤 Enviando GET a:", url);

      try {
        const res = await fetch(url);
        console.log("📥 Respuesta cruda:", res);

        // Para depuración: ver texto antes de parsear
        const texto = await res.text();
        console.log("📄 Texto recibido:", texto);

        try {
          const data = JSON.parse(texto);
          console.log("✅ JSON parseado:", data);
          if (data.error) {
            alert("⚠️ Error recibido: " + data.error);
          } else {
            alert("✅ Respuesta correcta: " + data.mensaje);
          }
          log.textContent = JSON.stringify(data, null, 2);
        } catch (parseErr) {
          alert("❌ Error al parsear JSON: " + parseErr.message);
          console.error("❌ Error parseando:", parseErr);
          log.textContent = "Texto recibido no es JSON:\n\n" + texto;
        }

      } catch (err) {
        alert("❌ Error de conexión: " + err.message);
        console.error("❌ Error al consultar WebApp:", err);
        log.textContent = "Error: " + err.message + "\n\nTip: Verifica que el despliegue sea 'Cualquiera' y hayas autorizado los permisos.";
      }
    }

    async function enviar() {
      const log = document.getElementById("salida");
      log.textContent = "Enviando datos...";
      const params = new URLSearchParams();
      params.append("numero", "99");
      params.append("comprador", "Usuario Prueba");
      console.log("📤 Enviando POST con:", Object.fromEntries(params));

      try {
        const res = await fetch(WEBAPP_URL, {
          method: "POST",
          body: params,
          headers: { "Content-Type": "application/x-www-form-urlencoded" }
        });
        console.log("📥 Respuesta cruda POST:", res);

        const texto = await res.text();
        console.log("📄 Texto recibido POST:", texto);

        try {
          const data = JSON.parse(texto);
          console.log("✅ JSON parseado POST:", data);
          if (data.error) {
            alert("⚠️ Error en POST: " + data.error);
          } else {
            alert("✅ POST correcto: " + data.mensaje);
          }
          log.textContent = JSON.stringify(data, null, 2);
        } catch (parseErr) {
          alert("❌ Error al parsear JSON en POST: " + parseErr.message);
          console.error("❌ Error parseando POST:", parseErr);
          log.textContent = "Texto recibido no es JSON:\n\n" + texto;
        }

      } catch (err) {
        alert("❌ Error de conexión en POST: " + err.message);
        console.error("❌ Error al consultar WebApp (POST):", err);
        log.textContent = "Error en POST: " + err.message;
      }
    }
  </script>
</body>
</html>
